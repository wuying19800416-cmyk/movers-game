<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Movers 單字王 - 隨機拼字挑戰版</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.2s ease-in-out 2; }
    </style>
</head>
<body class="bg-indigo-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const ALL_VOCAB = [
            { word: 'above', key: 'prep', emoji: '⬆️' }, { word: 'address', key: 'n', emoji: '🏠' }, { word: 'afraid', key: 'adj', emoji: '😨' },
            { word: 'after', key: 'prep', emoji: '⏰' }, { word: 'all right', key: 'adj+adv', emoji: '👌' }, { word: 'always', key: 'adv', emoji: '♾️' },
            { word: 'asleep', key: 'adj', emoji: '😴' }, { word: 'awake', key: 'adj', emoji: '👀' }, { word: 'back', key: 'adj+adv+n', emoji: '🔙' },
            { word: 'beard', key: 'n', emoji: '🧔' }, { word: 'blanket', key: 'n', emoji: '🛌' }, { word: 'boring', key: 'adj', emoji: '🥱' },
            { word: 'bottle', key: 'n', emoji: '🍼' }, { word: 'bowl', key: 'n', emoji: '🥣' }, { word: 'brave', key: 'adj', emoji: '🦁' },
            { word: 'brilliant', key: 'adj', emoji: '🌟' }, { word: 'build', key: 'v', emoji: '🧱' }, { word: 'bus station', key: 'n', emoji: '🚏' },
            { word: 'cage', key: 'n', emoji: '🥅' }, { word: 'careful', key: 'adj', emoji: '⚠️' }, { word: 'carry', key: 'v', emoji: '📦' },
            { word: 'catch', key: 'v', emoji: '🧤' }, { word: 'cheese', key: 'n', emoji: '🧀' }, { word: 'cinema', key: 'n', emoji: '🎬' },
            { word: 'clever', key: 'adj', emoji: '💡' }, { word: 'climb', key: 'v', emoji: '🧗' }, { word: 'cloudy', key: 'adj', emoji: '☁️' },
            { word: 'clown', key: 'n', emoji: '🤡' }, { word: 'cook', key: 'n+v', emoji: '👨‍🍳' }, { word: 'dangerous', key: 'adj', emoji: '🚫' },
            { word: 'daughter', key: 'n', emoji: '👧' }, { word: 'dentist', key: 'n', emoji: '🦷' }, { word: 'difficult', key: 'adj', emoji: '🧠' },
            { word: 'dolphin', key: 'n', emoji: '🐬' }, { word: 'dream', key: 'n+v', emoji: '💭' }, { word: 'drive', key: 'v', emoji: '🚗' },
            { word: 'earache', key: 'n', emoji: '👂' }, { word: 'elevator', key: 'n', emoji: '🛗' }, { word: 'exciting', key: 'adj', emoji: '🤩' },
            { word: 'farmer', key: 'n', emoji: '👨‍🌾' }, { word: 'forest', key: 'n', emoji: '🌲' }, { word: 'frightened', key: 'adj', emoji: '😱' },
            { word: 'glass', key: 'n', emoji: '🥛' }, { word: 'grandparent', key: 'n', emoji: '👵' }, { word: 'grass', key: 'n', emoji: '🌱' },
            { word: 'headache', key: 'n', emoji: '🤕' }, { word: 'helmet', key: 'n', emoji: '🪖' }, { word: 'holiday', key: 'n', emoji: '🏖️' },
            { word: 'hospital', key: 'n', emoji: '🏥' }, { word: 'hungry', key: 'adj', emoji: '😋' }, { word: 'island', key: 'n', emoji: '🏝️' },
            { word: 'jungle', key: 'n', emoji: '🌳' }, { word: 'kangaroo', key: 'n', emoji: '🦘' }, { word: 'kick', key: 'v', emoji: '⚽' },
            { word: 'kitten', key: 'n', emoji: '🐱' }, { word: 'laptop', key: 'n', emoji: '💻' }, { word: 'library', key: 'n', emoji: '📚' },
            { word: 'lion', key: 'n', emoji: '🦁' }, { word: 'market', key: 'n', emoji: '🍎' }, { word: 'mountain', key: 'n', emoji: '⛰️' },
            { word: 'nurse', key: 'n', emoji: '👩‍⚕️' }, { word: 'pancake', key: 'n', emoji: '🥞' }, { word: 'panda', key: 'n', emoji: '🐼' },
            { word: 'penguin', key: 'n', emoji: '🐧' }, { word: 'pirate', key: 'n', emoji: '🏴‍☠️' }, { word: 'playground', key: 'n', emoji: '🎠' },
            { word: 'rainbow', key: 'n', emoji: '🌈' }, { word: 'river', key: 'n', emoji: '🌊' }, { word: 'shoulder', key: 'n', emoji: '💪' },
            { word: 'skate', key: 'v', emoji: '⛸️' }, { word: 'snail', key: 'n', emoji: '🐌' }, { word: 'stomach', key: 'n', emoji: '🍕' },
            { word: 'supermarket', key: 'n', emoji: '🛒' }, { word: 'treasure', key: 'n', emoji: '💰' }, { word: 'waterfall', key: 'n', emoji: '⛲' },
            { word: 'whale', key: 'n', emoji: '🐋' }, { word: 'windy', key: 'adj', emoji: '🌬️' }, { word: 'yesterday', key: 'adv+n', emoji: '📅' }
        ];

        function App() {
            const [gameState, setGameState] = useState('menu');
            const [score, setScore] = useState(0);
            const [highScore, setHighScore] = useState(0);
            const [feedback, setFeedback] = useState(null);
            const [userInput, setUserInput] = useState('');
            const [currentWord, setCurrentWord] = useState(null);
            const [maskedWord, setMaskedWord] = useState("");

            const speak = (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'en-US';
                    u.rate = 0.85;
                    window.speechSynthesis.speak(u);
                }
            };

            // 產生隨機挖空單字的輔助函數
            const generateMaskedWord = (word) => {
                let masked = "";
                let hasBlank = false;
                let hasLetter = false;

                // 嘗試產生隨機遮罩
                for (let i = 0; i < word.length; i++) {
                    if (word[i] === ' ') {
                        masked += ' ';
                    } else {
                        // 約 50% 機率挖空
                        const shouldMask = Math.random() > 0.5;
                        if (shouldMask) {
                            masked += "_";
                            hasBlank = true;
                        } else {
                            masked += word[i];
                            hasLetter = true;
                        }
                    }
                }

                // 保底機制：確保至少有一個空格
                if (!hasBlank) {
                    const idx = Math.floor(Math.random() * word.length);
                    if (word[idx] !== ' ') {
                        masked = masked.substring(0, idx) + "_" + masked.substring(idx + 1);
                    }
                }
                // 保底機制：確保至少有一個字母顯示
                if (!hasLetter) {
                    const idx = Math.floor(Math.random() * word.length);
                    if (word[idx] !== ' ') {
                        masked = masked.substring(0, idx) + word[idx] + masked.substring(idx + 1);
                    }
                }

                return masked;
            };

            // 記憶翻牌
            const [cards, setCards] = useState([]);
            const [flipped, setFlipped] = useState([]);
            const [solved, setSolved] = useState([]);
            const initMemory = () => {
                const selected = [...ALL_VOCAB].sort(() => 0.5 - Math.random()).slice(0, 6);
                setCards([...selected.map(w => ({...w, type: 'word', id: Math.random()})),
                          ...selected.map(w => ({...w, type: 'emoji', id: Math.random()}))].sort(() => 0.5 - Math.random()));
                setFlipped([]); setSolved([]); setScore(0); setGameState('memory');
            };

            // 拼字大師 (全拼)
            const initSpelling = () => {
                const word = ALL_VOCAB[Math.floor(Math.random() * ALL_VOCAB.length)];
                setCurrentWord(word); setUserInput(''); setFeedback(null); setScore(0); setGameState('spelling');
                setTimeout(() => speak(word.word), 500);
            };

            // 拼字填空賽 (隨機 Masked)
            const initFillBlanks = () => {
                const wordObj = ALL_VOCAB[Math.floor(Math.random() * ALL_VOCAB.length)];
                setCurrentWord(wordObj);
                setMaskedWord(generateMaskedWord(wordObj.word));
                setUserInput(''); setFeedback(null); setScore(0); setGameState('fillBlanks');
                setTimeout(() => speak(wordObj.word), 500);
            };

            const checkAnswer = (mode) => {
                if (userInput.toLowerCase().trim() === currentWord.word.toLowerCase()) {
                    setFeedback('correct'); setScore(s => s + 20); speak("Excellent!");
                    setTimeout(() => {
                        const next = ALL_VOCAB[Math.floor(Math.random() * ALL_VOCAB.length)];
                        setCurrentWord(next); setUserInput(''); setFeedback(null);
                        if (mode === 'fillBlanks') {
                            setMaskedWord(generateMaskedWord(next.word));
                        }
                        speak(next.word);
                    }, 1200);
                } else {
                    setFeedback('wrong'); speak("Try again");
                    setTimeout(() => setFeedback(null), 800);
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center p-4">
                    <div className="w-full max-w-md bg-white rounded-2xl shadow-sm p-4 mb-4 flex justify-between items-center border-b-4 border-indigo-100">
                        <div className="font-bold text-slate-600">🏆 {score}</div>
                        <div className="text-xl font-black text-indigo-600">Movers 單字王</div>
                        <div className="font-bold text-slate-600">⭐ {highScore}</div>
                    </div>

                    <div className="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden relative border-b-8 border-indigo-200" style={{ height: '560px' }}>
                        
                        {gameState === 'menu' && (
                            <div className="h-full flex flex-col items-center justify-center p-8 text-center">
                                <div className="text-6xl mb-6">🏫</div>
                                <h2 className="text-2xl font-black text-slate-800 mb-2">單字挑戰賽</h2>
                                <p className="text-slate-500 mb-8 font-medium">選擇關卡開始練習</p>
                                <div className="grid gap-4 w-full">
                                    <button onClick={initMemory} className="bg-sky-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">🧠 記憶翻牌 (Movers A-Z)</button>
                                    <button onClick={initSpelling} className="bg-emerald-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">⌨️ 拼字大師 (全拼練習)</button>
                                    <button onClick={initFillBlanks} className="bg-orange-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">🧩 拼字填空賽 (隨機挖空)</button>
                                </div>
                            </div>
                        )}

                        {gameState === 'memory' && (
                            <div className="h-full p-4 grid grid-cols-3 gap-3">
                                {cards.map((card, i) => (
                                    <div key={card.id} onClick={() => {
                                        if (flipped.length === 2 || solved.includes(i) || flipped.includes(i)) return;
                                        speak(card.word);
                                        const nf = [...flipped, i]; setFlipped(nf);
                                        if (nf.length === 2) {
                                            if (cards[nf[0]].word === cards[nf[1]].word) {
                                                setSolved(s => [...s, ...nf]); setScore(s => s + 10); setFlipped([]);
                                                if (solved.length + 2 === cards.length) setTimeout(() => setGameState('gameOver'), 1000);
                                            } else { setTimeout(() => setFlipped([]), 1000); }
                                        }
                                    }} className={`cursor-pointer rounded-xl flex flex-col items-center justify-center transition-all duration-300 ${flipped.includes(i) || solved.includes(i) ? 'bg-white border-2 border-sky-300' : 'bg-sky-500 text-transparent'}`}>
                                        {(flipped.includes(i) || solved.includes(i)) && (
                                            card.type === 'word' ? <div className="text-[10px] font-bold text-sky-800 text-center uppercase">{card.word}<br/><span className="text-[8px] opacity-50">({card.key})</span></div> : <span className="text-3xl">{card.emoji}</span>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}

                        {(gameState === 'spelling' || gameState === 'fillBlanks') && currentWord && (
                            <div className="h-full flex flex-col items-center justify-center p-6 text-center">
                                <div className="text-xs bg-indigo-100 text-indigo-600 px-3 py-1 rounded-full uppercase font-bold mb-4">{currentWord.key}</div>
                                <div className="text-8xl mb-4">{currentWord.emoji}</div>
                                
                                {gameState === 'fillBlanks' && (
                                    <div className="text-4xl font-mono tracking-widest text-indigo-500 mb-6 font-black">
                                        {maskedWord.split('').map((char, i) => (
                                            <span key={i} className={char === '_' ? 'border-b-4 border-indigo-200 mx-1' : ''}>{char}</span>
                                        ))}
                                    </div>
                                )}

                                <button onClick={() => speak(currentWord.word)} className="mb-6 bg-indigo-50 p-4 rounded-full text-indigo-600 active:bg-indigo-100">🔊 點擊朗讀</button>
                                
                                <input autoFocus type="text" value={userInput} onChange={e => setUserInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && checkAnswer(gameState)}
                                    placeholder={gameState === 'fillBlanks' ? "補全單字..." : "拼出單字..."}
                                    className={`w-full text-center text-3xl font-bold p-4 border-4 rounded-2xl outline-none transition-all ${feedback==='correct'?'border-emerald-400 bg-emerald-50':feedback==='wrong'?'border-red-400 bg-red-50 animate-shake':'border-slate-100 shadow-inner'}`} />
                                
                                <div className="mt-8 flex gap-4 w-full">
                                    <button onClick={() => checkAnswer(gameState)} className="flex-1 bg-indigo-500 text-white font-bold py-4 rounded-xl shadow-lg">檢查答案</button>
                                    <button onClick={() => setGameState('menu')} className="bg-slate-100 p-4 rounded-xl text-slate-400">🏠</button>
                                </div>
                            </div>
                        )}

                        {gameState === 'gameOver' && (
                            <div className="h-full flex flex-col items-center justify-center p-8 text-center">
                                <div className="text-7xl mb-6">🎉</div>
                                <h2 className="text-3xl font-black text-slate-800 mb-2">挑戰成功！</h2>
                                <p className="text-xl text-slate-500 mb-8">你一共得到了 {score} 分</p>
                                <button onClick={() => { if(score > highScore) setHighScore(score); setGameState('menu'); }}
                                    className="bg-indigo-600 text-white font-bold py-3 px-10 rounded-full shadow-lg">回主選單</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
